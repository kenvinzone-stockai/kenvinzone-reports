<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<title>KenvinZone — Strategy Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    /* Obsidian Gold theme */
    --bg-0: #0a0e1a;
    --bg-1: #0f1420;
    --bg-2: #161c2e;
    --bg-3: #1c2338;
    --bg-4: #232c44;
    --border-1: #1f2940;
    --border-2: #2a3553;
    --border-3: #364263;

    --gold: #fbbf24;
    --gold-2: #f59e0b;
    --gold-3: #d97706;
    --gold-soft: rgba(251,191,36,0.10);
    --gold-glow: rgba(251,191,36,0.30);

    --emerald: #10b981;
    --emerald-soft: rgba(16,185,129,0.10);
    --rose: #f43f5e;
    --rose-soft: rgba(244,63,94,0.10);
    --sky: #38bdf8;
    --sky-soft: rgba(56,189,248,0.10);

    --text-0: #f1f5f9;
    --text-1: #cbd5e1;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --text-4: #475569;

    --radius-xs: 6px;
    --radius-sm: 10px;
    --radius: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;

    --shadow-1: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-2: 0 4px 16px rgba(0,0,0,0.35);
    --shadow-3: 0 12px 40px rgba(0,0,0,0.45);
    --shadow-gold: 0 0 24px rgba(251,191,36,0.20);

    --font-display: 'Syne', system-ui, sans-serif;
    --font-mono: 'DM Mono', ui-monospace, monospace;
    --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
  }

  /* Tabular numerals for mono font */
  .mono, [class*="mono"] { font-variant-numeric: tabular-nums; }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(251,191,36,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(56,189,248,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 30% 30% at 10% 80%, rgba(244,63,94,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 0%, transparent 80%);
  }

  /* ========== NAV ========== */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.75);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--border-1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 60px;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-3) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg-0);
    font-size: 14px;
    font-weight: 900;
    box-shadow: var(--shadow-gold);
    position: relative;
  }

  .brand-mark::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 11px;
    border: 1px solid rgba(251,191,36,0.3);
    animation: ring 3s ease infinite;
  }

  @keyframes ring {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 13px;
    border-radius: 999px;
    background: var(--emerald-soft);
    border: 1px solid rgba(16,185,129,0.25);
    color: var(--emerald);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--emerald);
    position: relative;
  }

  .live-dot::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--emerald);
    opacity: 0.4;
    animation: ping 1.5s ease-out infinite;
  }

  @keyframes ping {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .last-updated {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
  }

  /* ========== LAYOUT ========== */
  .layout {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: calc(100vh - 60px);
  }

  .sidebar {
    border-right: 1px solid var(--border-1);
    background: rgba(15,20,32,0.6);
    backdrop-filter: blur(12px);
  }

  .sidebar-inner {
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
  }

  /* ========== SEARCH ========== */
  .search-block {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border-1);
  }

  .search-input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    color: var(--text-0);
    padding: 9px 14px 9px 34px;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: all 0.18s var(--ease-out);
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: 11px center;
  }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-soft);
  }

  .search-input::placeholder { color: var(--text-4); }

  /* ========== FILTERS ========== */
  .month-selector {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-1);
  }

  .month-select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    color: var(--text-0);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    outline: none;
    transition: all 0.18s var(--ease-out);
    appearance: none;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 32px;
  }

  .month-select:focus { border-color: var(--gold); }

  .time-filter {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-1);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }

  .tf-btn {
    padding: 6px 4px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border-2);
    background: var(--bg-2);
    color: var(--text-3);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s var(--ease-out);
  }

  .tf-btn:hover { color: var(--gold); border-color: var(--border-3); }
  .tf-btn.active {
    color: var(--gold);
    border-color: var(--gold);
    background: var(--gold-soft);
    box-shadow: 0 0 12px var(--gold-soft);
  }

  .filters {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-1);
    display: grid;
    gap: 12px;
  }

  .filter-block { display: grid; gap: 8px; }

  .filter-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    border: 1px solid var(--border-2);
    background: var(--bg-2);
    color: var(--text-2);
    border-radius: 999px;
    padding: 5px 11px;
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.18s var(--ease-out);
  }

  .chip:hover { color: var(--gold); border-color: var(--border-3); }
  .chip.active {
    color: var(--gold);
    border-color: var(--gold);
    background: var(--gold-soft);
    box-shadow: 0 0 12px var(--gold-soft);
  }

  /* ========== STATS BAR ========== */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    padding: 0;
    border-bottom: 1px solid var(--border-1);
    background: var(--border-1);
  }

  .stat-cell {
    padding: 10px 12px;
    background: var(--bg-1);
    text-align: center;
  }

  .stat-cell .num {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-cell .lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .num.bull { color: var(--emerald); }
  .num.bear { color: var(--rose); }
  .num.total { color: var(--gold); }

  /* ========== REPORT LIST ========== */
  .report-list {
    flex: 1;
    overflow: auto;
    padding: 12px;
    display: grid;
    gap: 8px;
    align-content: start;
    scrollbar-width: thin;
    scrollbar-color: var(--border-3) transparent;
  }

  .report-list::-webkit-scrollbar { width: 6px; }
  .report-list::-webkit-scrollbar-track { background: transparent; }
  .report-list::-webkit-scrollbar-thumb { background: var(--border-3); border-radius: 3px; }

  .date-group-header {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 2px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-group-header:first-child { margin-top: 0; }

  .date-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-1);
  }

  .report-count {
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 9px;
    color: var(--text-2);
  }

  .report-item {
    background: var(--bg-2);
    border: 1px solid var(--border-1);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s var(--ease-out);
    position: relative;
    overflow: hidden;
  }

  .report-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s var(--ease-out);
  }

  .report-item:hover {
    border-color: var(--border-3);
    transform: translateY(-1px);
    box-shadow: var(--shadow-2);
  }

  .report-item.active {
    border-color: var(--gold);
    background: linear-gradient(135deg, var(--gold-soft) 0%, var(--bg-2) 60%);
    box-shadow: 0 0 0 1px var(--gold-soft), var(--shadow-2);
  }

  .report-item.active::before { background: var(--gold); }

  .ri-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .ri-inst {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-0);
  }

  .ri-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
  }

  .ri-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

  .badge {
    padding: 2px 8px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    border: 1px solid var(--border-2);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .badge.bullish { color: var(--emerald); background: var(--emerald-soft); border-color: rgba(16,185,129,0.25); }
  .badge.bearish { color: var(--rose); background: var(--rose-soft); border-color: rgba(244,63,94,0.25); }
  .badge.neutral { color: var(--sky); background: var(--sky-soft); border-color: rgba(56,189,248,0.25); }
  .badge.conf { color: var(--gold); background: var(--gold-soft); border-color: rgba(251,191,36,0.25); }

  .ri-text {
    color: var(--text-2);
    font-size: 12px;
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ========== CONTENT ========== */
  .content { min-width: 0; }

  .content-inner {
    max-width: 1180px;
    padding: 24px;
    margin: 0 auto;
    display: grid;
    gap: 20px;
  }

  /* ========== SKELETON LOADER ========== */
  .skeleton-stack { display: grid; gap: 20px; padding: 24px; }
  .skel {
    background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s ease infinite;
    border-radius: var(--radius);
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-hero { height: 220px; border-radius: var(--radius-lg); }
  .skel-row { height: 140px; }
  .skel-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .skel-card { height: 200px; }

  .empty {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-3);
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: center;
    padding: 24px;
  }

  .empty-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 4px;
  }

  .empty-action {
    margin-top: 8px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gold);
    background: var(--gold-soft);
    color: var(--gold);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.18s var(--ease-out);
  }

  .empty-action:hover { background: var(--gold); color: var(--bg-0); }

  /* ========== HERO ========== */
  .hero {
    background: linear-gradient(135deg, var(--bg-2) 0%, var(--bg-3) 100%);
    border: 1px solid var(--border-2);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-3);
    overflow: hidden;
    position: relative;
    animation: fadeUp 0.5s var(--ease-out);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
  }

  .hero-inner {
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: start;
  }

  .hero-line {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .hero-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 36px;
    letter-spacing: -1.5px;
    color: var(--text-0);
    line-height: 1;
  }

  .hero-pill {
    padding: 4px 11px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid var(--border-2);
    color: var(--text-2);
    background: var(--bg-1);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .hero-pill.bullish { color: var(--emerald); background: var(--emerald-soft); border-color: rgba(16,185,129,0.3); }
  .hero-pill.bearish { color: var(--rose); background: var(--rose-soft); border-color: rgba(244,63,94,0.3); }
  .hero-pill.neutral { color: var(--sky); background: var(--sky-soft); border-color: rgba(56,189,248,0.3); }
  .hero-pill.conf-high { color: var(--gold); background: var(--gold-soft); border-color: rgba(251,191,36,0.3); }
  .hero-pill.conf-medium { color: var(--sky); background: var(--sky-soft); border-color: rgba(56,189,248,0.3); }
  .hero-pill.conf-low { color: var(--text-3); background: var(--bg-1); }

  .hero-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-4);
    margin-bottom: 16px;
  }

  .hero-meta span { display: inline-flex; align-items: center; gap: 5px; }

  .hero-insight {
    color: var(--text-1);
    line-height: 1.75;
    max-width: 720px;
    font-size: 14px;
  }

  .hero-price { text-align: right; }

  .hero-price-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
  }

  .hero-price-value {
    font-family: var(--font-mono);
    font-size: 42px;
    font-weight: 500;
    color: var(--gold);
    text-shadow: 0 0 32px rgba(251,191,36,0.25);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .hero-price-time {
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
  }

  .hero-sparkline {
    margin-top: 14px;
    height: 32px;
    width: 160px;
    margin-left: auto;
  }

  /* ========== PANEL ========== */
  .panel {
    background: var(--bg-1);
    border: 1px solid var(--border-1);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-2);
    overflow: hidden;
    animation: fadeUp 0.5s var(--ease-out) both;
  }

  .panel-body { padding: 22px 24px; }

  .panel-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .panel-title::before {
    content: '';
    width: 3px;
    height: 14px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-3) 100%);
    box-shadow: 0 0 8px var(--gold-glow);
  }

  /* ========== SUMMARY ========== */
  .summary-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; }

  .summary-box, .mini-box {
    background: var(--bg-2);
    border: 1px solid var(--border-1);
    border-radius: var(--radius);
    padding: 20px;
  }

  .summary-box p, .mini-box p { color: var(--text-1); line-height: 1.8; font-size: 14px; }

  .mini-title {
    font-family: var(--font-mono);

  .mini-kv { display: grid; gap: 10px; }

  /* ========== SCENARIOS ========== */
  .scenarios-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .scenario-card {

  .scenario-card.primary::after { background: linear-gradient(90deg, var(--gold), var(--gold-3)); }
  .scenario-card.alternative { border-color: rgba(56,189,248,0.25); }
  .scenario-card.alternative::after { background: var(--sky); }
  .scenario-card.invalidation { border-color: rgba(244,63,94,0.25); }
  .scenario-card.invalidation::after { background: var(--rose); }

  .scenario-type {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .scenario-type.primary { color: var(--gold); }
  .scenario-type.alternative { color: var(--sky); }
  .scenario-type.invalidation { color: var(--rose); }

  .scenario-bias {
    display: inline-block;
    margin-bottom: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .scenario-bias.bullish { color: var(--emerald); background: var(--emerald-soft); }
  .scenario-bias.bearish { color: var(--rose); background: var(--rose-soft); }
  .scenario-bias.neutral { color: var(--sky); background: var(--sky-soft); }

  .scenario-setup { color: var(--text-1); line-height: 1.65; font-size: 13px; margin-bottom: 16px; }

  .scenario-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; margin-bottom: 14px; }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 13px;
    color: var(--text-0);
    line-height: 1.5;
    font-family: var(--font-mono);
  }
  .stat-value.green { color: var(--emerald); }
  .stat-value.red { color: var(--rose); }
  .stat-value.gold { color: var(--gold); }

  .prob-wrap { margin-top: 10px; }
  .prob-head {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
    margin-bottom: 7px;
  }
  .prob-track { height: 5px; background: var(--bg-3); border-radius: 999px; overflow: hidden; }
  .prob-fill {
    height: 100%;
    width: 0;
    transition: width 0.5s var(--ease-out);
    border-radius: 999px;
  }
  .prob-fill.primary { background: linear-gradient(90deg, var(--gold-3), var(--gold)); box-shadow: 0 0 8px var(--gold-glow); }
  .prob-fill.alternative { background: var(--sky); }
  .prob-fill.invalidation { background: var(--rose); }

  /* ========== GRIDS ========== */
  .triple-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ========== TF TABLE ========== */
  .tf-table { width: 100%; border-collapse: collapse; }
  .tf-table tr { border-bottom: 1px solid var(--border-1); }
  .tf-table tr:last-child { border-bottom: none; }
  .tf-table td { padding: 12px 8px; vertical-align: top; }

  .tf-name {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gold);
    width: 56px;
    font-weight: 500;
  }

  .tf-trend {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    margin-right: 8px;
    margin-bottom: 4px;
  }

  .tf-trend.bullish { color: var(--emerald); background: var(--emerald-soft); }
  .tf-trend.bearish { color: var(--rose); background: var(--rose-soft); }
  .tf-trend.neutral { color: var(--sky); background: var(--sky-soft); }

  .tf-desc { color: var(--text-1); font-size: 12px; line-height: 1.55; }

  /* ========== LEVELS ========== */
  .levels { display: grid; gap: 8px; }

  .level {

  .dot.resistance { background: var(--rose); box-shadow: 0 0 10px rgba(244,63,94,0.5); }
  .dot.support { background: var(--emerald); box-shadow: 0 0 10px rgba(16,185,129,0.5); }
  .dot.current { background: var(--gold); box-shadow: 0 0 10px rgba(251,191,36,0.6); }

  .level-type {
    width: 80px;
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    color: var(--text-3);
    letter-spacing: 0.8px;
  }
  .level-price {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-0);

  }

  /* ========== LISTS ========== */
  .list-stack { display: grid; gap: 8px; }

  .list-item {
    background: var(--bg-2);
    border: 1px solid var(--border-1);

    color: var(--text-1);

  .list-item.bull { border-color: rgba(16,185,129,0.15); background: rgba(16,185,129,0.04); }
  .list-item.bear { border-color: rgba(244,63,94,0.15); background: rgba(244,63,94,0.04); }
  .list-item.risk { border-color: rgba(244,63,94,0.15); background: rgba(244,63,94,0.04); }

  /* ========== MATRIX ========== */
  .matrix-wrap { overflow-x: auto; }
  .matrix { width: 100%; border-collapse: collapse; min-width: 600px; }
  .matrix th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-1);
    color: var(--text-4);

    font-size: 9px;
    letter-spacing: 1px;

    color: var(--text-1);
    font-size: 12px;
    vertical-align: top;

  .matrix tr:last-child td { border-bottom: none; }
  .matrix tr:hover td { background: var(--bg-2); }

  /* ========== ACTION PLAN ========== */
  .exec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;

  .exec-card {
    background: var(--bg-2);
    border: 1px solid var(--border-1);
    border-radius: var(--radius);
    padding: 14px 16px;

  .exec-key {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .exec-val { color: var(--text-0); font-size: 13px; line-height: 1.6; }

  .checklist { display: grid; gap: 8px; }

  .check {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg-2);
    border: 1px solid var(--border-1);
    cursor: pointer;
    transition: all 0.18s var(--ease-out);
  }

  .check:hover { background: var(--bg-3); }

  .check-box {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border-3);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
    font-size: 12px;
    flex-shrink: 0;
    transition: all 0.18s var(--ease-spring);
  }

  .check.checked .check-box {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg-0);
    font-weight: 700;
    transform: scale(1.05);
  }
  .check.checked .check-text { text-decoration: line-through; color: var(--text-4); }
  .check-text { color: var(--text-1); font-size: 13px; line-height: 1.5; }

  /* ========== FAB (Mobile only) ========== */
  .fab {
    display: none;
    position: fixed;
    right: 20px;
    bottom: calc(20px + var(--safe-bottom));

    font-size: 22px;

  .fab:hover { transform: translateY(-2px) scale(1.05); }
  .fab:active { transform: scale(0.95); }

  .fab-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    background: var(--rose);
    color: white;
    font-size: 10px;
    font-family: var(--font-mono);
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 999px;
    padding: 0 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--bg-0);
  }

  /* ========== BOTTOM SHEET (Mobile only) ========== */
  .sheet-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s var(--ease-out);
  }

  .sheet-backdrop.open {
    display: block;
    opacity: 1;
  }

  .bottom-sheet {
    display: none;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-1);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.5);

    transform: translateY(100%);
    transition: transform 0.35s var(--ease-out);
    max-height: 88vh;
    flex-direction: column;
    padding-bottom: var(--safe-bottom);

  .bottom-sheet.open {
    display: flex;
    transform: translateY(0);
  }

  .sheet-handle {
    width: 100%;
    padding: 10px 0 6px;
    display: flex;
    justify-content: center;
    cursor: grab;
    touch-action: none;
  }

  .sheet-handle::before {
    content: '';
    width: 40px;
    height: 4px;
    border-radius: 999px;
    background: var(--border-3);
  }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 18px 14px;
    border-bottom: 1px solid var(--border-1);
  }

  .sheet-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: var(--text-0);
  }

  .sheet-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    color: var(--text-2);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s var(--ease-out);
  }

  .sheet-close:hover { background: var(--bg-4); color: var(--text-0); }

  .sheet-content {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* ========== TOAST ========== */
  .toast-container {
    position: fixed;
    top: 78px;
    right: 16px;
    z-index: 150;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--bg-2);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text-0);
    font-size: 13px;
    box-shadow: var(--shadow-3), 0 0 0 1px var(--gold-soft);
    pointer-events: auto;
    cursor: pointer;
    animation: toastIn 0.4s var(--ease-spring), toastOut 0.4s var(--ease-out) 4.5s forwards;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 320px;
  }

  .toast::before {
    content: '🔔';
    font-size: 16px;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes toastOut {
    to { opacity: 0; transform: translateX(20px); }
  }

  /* ========== SCROLL TOP ========== */
  .scroll-top {
    position: fixed;
    right: 20px;
    bottom: calc(20px + var(--safe-bottom));
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--bg-3);
    border: 1px solid var(--border-3);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow-2);
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s var(--ease-out);
    z-index: 89;
    font-size: 18px;
  }

  .scroll-top.visible { opacity: 1; pointer-events: auto; }
  .scroll-top:hover { background: var(--bg-4); transform: translateY(-2px); }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .fab { display: flex; }
    .scroll-top { right: 88px; }
    .summary-grid, .scenarios-grid, .triple-grid, .dual-grid {
      grid-template-columns: 1fr;
    }
    .hero-inner { grid-template-columns: 1fr; }
    .hero-price { text-align: left; }
    .hero-sparkline { margin-left: 0; }
  }

  @media (max-width: 640px) {
    .nav { padding: 0 14px; }
    .last-updated { display: none; }
    .content-inner { padding: 16px; gap: 14px; }
    .hero-inner { padding: 22px; }
    .panel-body { padding: 18px 20px; }
    .hero-title { font-size: 28px; }
    .hero-price-value { font-size: 32px; }
  }

  /* Reduce motion for accessibility */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

  <!-- ========== NAV ========== -->
  <div class="nav">

    <aside class="sidebar">

<script>
// ============================================================
// UTILS
// ============================================================
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeStr(v, fallback='—') {
  if (v === null || v === undefined || v === '') return fallback;
  if (typeof v === 'object') return JSON.stringify(v);
  return String(v);
}
function safeObj(v) { return v && typeof v === 'object' && !Array.isArray(v) ? v : {}; }
function safeArr(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string' && v.trim()) return [v];
  if (v && typeof v === 'object') return Object.values(v);
  return [];
}

function normalizeInstrument(inst) {
  const s = String(inst || '').toUpperCase();
  if (!s) return 'N/A';
  if (s.includes('XAU')) return 'XAUUSD';
  if (s.includes('NQ') || s.includes('US100') || s.includes('NAS') || s.includes('USTEC') || s.includes('USATEC')) return 'NQ / US100';
  if (s.includes('VN') || s.includes('VNINDEX')) return 'VNINDEX';
  return inst;
}

function getBiasClass(bias) {
  const b = String(bias || '').toLowerCase();
  if (b.includes('bull') || b.includes('long') || b.includes('up')) return 'bullish';
  if (b.includes('bear') || b.includes('short') || b.includes('down')) return 'bearish';
  return 'neutral';
}

function getBiasIcon(cls) {
  if (cls === 'bullish') return '▲';
  if (cls === 'bearish') return '▼';
  return '◆';
}

function getConfidenceClass(v) {
  if (typeof v === 'number') {
    if (v >= 70) return 'conf-high';
    if (v >= 45) return 'conf-medium';
    return 'conf-low';
  }
  const s = String(v || '').toLowerCase();
  if (s.includes('high') || s.includes('strong') || s.includes('cao')) return 'conf-high';
  if (s.includes('med') || s.includes('trung')) return 'conf-medium';
  return 'conf-low';
}

function fmtTs(ts) {
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    return d.toLocaleString('vi-VN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch { return String(ts); }
}

function fmtRelativeTime(ts) {
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '—';
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'vừa xong';
    if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
    if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
    if (diff < 604800) return `${Math.floor(diff/86400)} ngày trước`;
    return fmtTs(ts);
  } catch { return '—'; }
}

function fmtPrice(v) {
  const n = Number(v);
  if (Number.isFinite(n)) return n.toLocaleString('vi-VN', { minimumFractionDigits:0, maximumFractionDigits:2 });
  return safeStr(v);
}

function probValue(v) {
  if (v === null || v === undefined || v === '') return 0;
  const n = Number(v);
  if (!Number.isNaN(n)) return n > 1 ? n : n * 100;
  const m = String(v).match(/(\d+(\.\d+)?)/);
  return m ? Number(m[1]) : 0;
}

function textArray(v) {
  return safeArr(v).map(item => {
    if (typeof item === 'object') return safeStr(item.factor || item.description || item.name || item.title || item.event || item);
    return safeStr(item);
  });
}

function getMonthKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  const months = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function normalizeScenario(key, v) {
  const s = safeObj(v);
  if (!Object.keys(s).length) return null;
  return {
    key,
    bias: safeStr(s.bias || s.direction || s.type || key),
    setup: safeStr(s.setup || s.condition || s.trigger || s.description || s.action || '—'),
    target: Array.isArray(s.target) ? s.target.map(fmtPrice).join(' → ') : safeStr(s.target || s.targets || s.take_profit || s.tp || '—'),
    stop: safeStr(s.stop_loss || s.stop || s.sl || '—'),
    rr: safeStr(s.risk_reward || s.rr || s.ratio || '—'),
    probability: probValue(s.probability || s.prob || 0)
  };
}

function normalizeReport(r) {
  let raw = r.raw !== undefined ? r.raw : r;
  if (typeof raw === 'string') {
    try { raw = JSON.parse(raw); } catch(e) { console.error('Parse raw error', e); return null; }
  }
  if (!raw || typeof raw !== 'object') return null;

  const summary = safeObj(raw.summary || raw.executive_summary || raw.executiveSummary);
  const structure = safeObj(raw.market_structure || raw.multi_timeframe_analysis || raw.multiTimeframeAnalysis);
  const confluence = safeObj(raw.confluence_analysis || raw.bias_logic);
  const scenariosObj = safeObj(raw.trading_scenarios || raw.scenario_matrix || raw.scenarios);
  const execution = safeObj(raw.execution_plan || raw.trading_strategy);
  const keyLevels = safeObj(raw.key_levels || raw.keyLevels);
  const checklist = safeObj(raw.action_checklist || raw.actionChecklist);

  const instrument = normalizeInstrument(r.instrument || summary.instrument || raw.instrument || raw.metadata?.instrument);
  const price = r.price_current || summary.current_price || keyLevels.currentPrice || keyLevels.current_price || 0;
  const bias = safeStr(summary.primary_bias || summary.bias_direction || summary.bias || raw.bias_primary || raw.bias || 'Neutral');
  const confidence = summary.confidence_level || summary.confidence || raw.confidence || raw.confidence_level || 'N/A';

  const tfRows = ['D1','H4','H1','M15'].map(tf => {
    const d = safeObj(structure[tf] || structure[tf.toLowerCase()]);
    if (!Object.keys(d).length) return null;
    return {
      tf,
      trend: safeStr(d.bias || d.trend || '—'),
      description: [
        safeStr(d.structure || '', ''),
        safeStr(d.market_structure || '', ''),
        safeStr(d.intraday_story || '', ''),
        safeStr(d.key_levels || '', ''),
        safeStr(d.momentum || '', ''),
        safeStr(d.trigger_setup || '', '')
      ].filter(x => x && x !== '—').join(' · ')
    };
  }).filter(Boolean);

  const scenarios = [
    normalizeScenario('primary_scenario', scenariosObj.primary_scenario),
    normalizeScenario('alternative_scenario', scenariosObj.alternative_scenario),
    normalizeScenario('invalidation_scenario', scenariosObj.invalidation_scenario)
  ].filter(Boolean);

  const datetime = r.datetime || raw.timestamp || new Date().toISOString();

  return {
    id: r.id || `RPT-${Date.now()}`,
    instrument,
    price,
    priceFmt: fmtPrice(price),
    bias,
    biasClass: getBiasClass(bias),
    confidence,
    confidenceClass: getConfidenceClass(confidence),
    insight: safeStr(summary.key_insight || summary.summary || summary.headline || raw.dashboard_summary || raw.telegram_summary || '—'),
    archetype: safeStr(r.archetype || raw.archetype || raw.metadata?.archetype || 'Báo cáo tự động'),
    datetime,
    dateDisplay: r.date_display || fmtTs(datetime).split(' ')[0],
    timeDisplay: r.time_display || (fmtTs(datetime).split(' ')[1] || '—'),
    dateObj: new Date(datetime),
    monthKey: getMonthKey(datetime),
    resistance: safeArr(structure.H4?.critical_levels?.resistance || keyLevels.resistance || keyLevels.resistances || []).map(fmtPrice),
    support: safeArr(structure.H4?.critical_levels?.support || keyLevels.support || keyLevels.supports || []).map(fmtPrice),
    tfRows,
    bullish: textArray(confluence.bullish_confluence || confluence.bullish_factors || []),
    bearish: textArray(confluence.bearish_confluence || confluence.bearish_factors || []),
    risks: textArray(raw.risk_factors || raw.risk_assessment || []),
    catalysts: textArray(raw.catalyst_watch || raw.catalyst_context || raw.market_context || []),
    execution,
    actionItems: [
      ...textArray(checklist.immediate || []),
      ...textArray(checklist.pre_trade || []),
      ...textArray(checklist.monitoring || []),
      ...textArray(execution.action_plan || execution.actions || execution.checklist || [])
    ],
    scenarios,
    primaryScenario: scenarios.find(x => x.key === 'primary_scenario') || null,
    alternativeScenario: scenarios.find(x => x.key === 'alternative_scenario') || null,
    invalidationScenario: scenarios.find(x => x.key === 'invalidation_scenario') || null,
    docx: r.docx_url || ''
  };
}

const MAX_REPORTS = 50;
const STORAGE_KEY = 'kenvinzone_reports_v2';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

// LRU-friendly save with graceful degradation
function saveToStorage(reports) {
  let attempt = reports.slice(0, MAX_REPORTS);
  for (let i = 0; i < 5; i++) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(attempt));
      return;
    } catch(e) {
      // Quota exceeded — shrink and retry
      if (attempt.length <= 5) {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        return;
      }
      attempt = attempt.slice(0, Math.floor(attempt.length * 0.7));
    }
  }
}

async function tryFetch(url) {
  try {
    const res = await fetch(url + '?t=' + Date.now());
    if (!res.ok) return [];
    const json = await res.json();
    if (Array.isArray(json)) return json;
    if (Array.isArray(json.reports)) return json.reports;
    return [json];
  } catch(e) { return []; }
}

async function loadReports(showToast = false) {
  const [freshRaw, historyRaw] = await Promise.all([
    tryFetch('reports.json'),
    tryFetch('history.json')
  ]);

  const storedRaw = loadFromStorage();

  const seen = new Set();
  const mergedRaw = [...freshRaw, ...historyRaw, ...storedRaw].filter(r => {
    const id = r.id || r.datetime;
    if (!id || seen.has(id)) return false;
    seen.add(id);
    return true;
  }).slice(0, MAX_REPORTS);

  saveToStorage(mergedRaw);

  const seen2 = new Set();
  const newReports = mergedRaw.map(normalizeReport).filter(Boolean)
    .filter(r => {
      if (seen2.has(r.id)) return false;
      seen2.add(r.id);
      return true;
    })
    .sort((a, b) => new Date(b.datetime) - new Date(a.datetime));

  // Detect new report for toast
  if (showToast && newReports.length > 0 && lastReportId && newReports[0].id !== lastReportId) {
    showNewReportToast(newReports[0]);
  }
  if (newReports.length > 0) lastReportId = newReports[0].id;

  allReports = newReports;

  const monthSet = new Set(allReports.map(r => r.monthKey));
  availableMonths = [...monthSet].sort().reverse();

  updateMonthSelector();

  if (allReports.length > 0) {
    document.getElementById('lastUpdated').textContent = fmtRelativeTime(allReports[0].datetime);
  }

  renderFilters();
  applyFilters();

  if (!selectedId && filteredReports.length) selectedId = filteredReports[0].id;
  if (filteredReports.length && !filteredReports.some(r => r.id === selectedId)) selectedId = filteredReports[0].id;

  renderList();
  renderContent();
  updateStats();
}

function isInTimeRange(r, range) {
  const now = new Date();
  const d = r.dateObj;
  if (range === 'today') return d.toDateString() === now.toDateString();
  if (range === 'week') {
    const weekAgo = new Date(now);
    weekAgo.setDate(weekAgo.getDate() - 7);
    return d >= weekAgo;
  }
  if (range === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  return true;
}

function matchSearch(r, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return [
    r.instrument, r.bias, r.insight, r.archetype,
    ...r.bullish, ...r.bearish, ...r.risks, ...r.catalysts,
    ...r.actionItems
  ].some(x => String(x).toLowerCase().includes(q));
}

function applyFilters() {
  const monthFilter = document.getElementById('monthSelect')?.value || 'all';

  filteredReports = allReports.filter(r => {
    if (filters.instrument !== 'all' && r.instrument !== filters.instrument) return false;
    if (filters.bias !== 'all' && r.biasClass !== filters.bias) return false;
    if (filters.time !== 'all' && !isInTimeRange(r, filters.time)) return false;
    if (monthFilter !== 'all' && monthFilter !== '' && r.monthKey !== monthFilter) return false;
    if (!matchSearch(r, filters.search)) return false;
    return true;
  });
}

function updateStats() {
  document.getElementById('statTotal').textContent = filteredReports.length;
  document.getElementById('statBull').textContent = filteredReports.filter(r => r.biasClass === 'bullish').length;
  document.getElementById('statBear').textContent = filteredReports.filter(r => r.biasClass === 'bearish').length;
}

function buildBiasSparkline(reports, instrument) {
  // Get last 10 reports of same instrument
  const series = reports
    .filter(x => x.instrument === instrument)
    .slice(0, 10)
    .reverse()
    .map(x => x.biasClass === 'bullish' ? 1 : x.biasClass === 'bearish' ? -1 : 0);

  if (series.length < 2) return '';

  const w = 160, h = 32, pad = 2;
  const stepX = (w - pad * 2) / (series.length - 1);
  const points = series.map((v, i) => {
    const x = pad + i * stepX;
    const y = h / 2 - (v * (h / 2 - pad));
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const lastV = series[series.length - 1];
  const color = lastV > 0 ? 'var(--emerald)' : lastV < 0 ? 'var(--rose)' : 'var(--sky)';

  return `
    <svg class="hero-sparkline" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="${points} ${w-pad},${h} ${pad},${h}" fill="url(#sparkGrad)"/>
    </svg>`;
}

            <div class="hero-pill ${r.biasClass}">${getBiasIcon(r.biasClass)} ${esc(r.bias)}</div>
            <div class="hero-pill ${r.confidenceClass}">${esc(safeStr(r.confidence,'N/A'))}</div>
          </div>
          <div class="hero-meta">
            <span>📅 ${esc(r.dateDisplay)}</span>
            <span>🕐 ${esc(r.timeDisplay)} UTC+7</span>

          <div class="hero-insight">${esc(r.insight)}</div>
        </div>

          <div class="hero-price-label">Giá hiện tại</div>
          <div class="hero-price-value">${esc(r.priceFmt)}</div>

      <div class="panel-body">

        <div class="summary-grid">

          <div class="mini-box">

            <div class="mini-kv">
              <div class="mini-kv-row"><span class="mini-kv-key">Bias</span><span class="mini-kv-val">${esc(r.bias)}</span></div>
              <div class="mini-kv-row"><span class="mini-kv-key">Confidence</span><span class="mini-kv-val">${esc(safeStr(r.confidence,'N/A'))}</span></div>
              <div class="mini-kv-row"><span class="mini-kv-key">Instrument</span><span class="mini-kv-val">${esc(r.instrument)}</span></div>

    <div class="panel" style="animation-delay:0.1s">

          ${scenarioCard('◈ Kịch bản thay thế','alternative',r.alternativeScenario)}
          ${scenarioCard('✕ Vô hiệu hóa','invalidation',r.invalidationScenario)}

    <div class="triple-grid">
      <div class="panel" style="animation-delay:0.15s">
        <div class="panel-body">
          <div class="panel-title">Đa khung thời gian</div>
          <table class="tf-table"><tbody>${tfRows}</tbody></table>
        </div>
      </div>
      <div class="panel" style="animation-delay:0.2s">
        <div class="panel-body">

                <span class="level-type">${esc(i.type)}</span>
                <span class="level-price">${esc(i.price)}</span>

          </div>
        </div>

      <div class="panel" style="animation-delay:0.25s">
        <div class="panel-body">
          <div class="panel-title">Radar rủi ro</div>
          <div class="list-stack">
            ${(r.risks.length ? r.risks : ['Không có rủi ro nào']).map(x => `<div class="list-item risk">${esc(x)}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="dual-grid">
      <div class="panel" style="animation-delay:0.3s">
        <div class="panel-body">
          <div class="panel-title">Yếu tố hỗ trợ / áp lực</div>

      </div>
      <div class="panel" style="animation-delay:0.35s">
        <div class="panel-body">

          </div>

    </div>

    <div class="panel" style="animation-delay:0.4s">
      <div class="panel-body">
        <div class="panel-title">Ma trận kịch bản</div>
        <div class="matrix-wrap">
          <table class="matrix">
            <thead>
              <tr>
                <th>Type</th><th>Bias</th><th>Setup</th><th>Target</th><th>Stop</th><th>R/R</th><th>Probability</th>
              </tr>
            </thead>
            <tbody>${matrixRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="panel" style="animation-delay:0.45s">
      <div class="panel-body">
        <div class="panel-title">Action plan</div>
        ${execEntries.length ? `
          <div class="exec-grid">
            ${execEntries.map(([k,v]) => `
              <div class="exec-card">
                <div class="exec-key">${esc(k.replaceAll('_',' '))}</div>

        <div class="checklist">
          ${(r.actionItems.length ? r.actionItems : [
            'Confirm bias alignment across timeframes',
            'Check confluence factors',
            'Verify key level proximity',
            'Set entry order',
            'Place stop loss',
            'Define take profit targets',
            'Monitor catalyst events'
          ]).map((x, i) => {
            const checked = reportChecks[i] ? 'checked' : '';
            return `
            <div class="check ${checked}" data-report="${esc(r.id)}" data-idx="${i}">
              <div class="check-box">✓</div>
              <div class="check-text">${esc(x)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;

  // Animate probability bars
  setTimeout(() => {
    document.querySelectorAll('.prob-fill[data-pct]').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);

  // Attach persistent checklist handlers
  document.querySelectorAll('.check').forEach(el => {
    el.onclick = () => {
      const reportId = el.dataset.report;
      const idx = el.dataset.idx;
      el.classList.toggle('checked');
      if (!checklistState[reportId]) checklistState[reportId] = {};
      checklistState[reportId][idx] = el.classList.contains('checked');
      saveChecklistState(checklistState);
    };
  });
}

// ============================================================
// BOTTOM SHEET
// ============================================================
function openSheet() {
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe-down to close
function setupSheetGestures() {
  const sheet = document.getElementById('bottomSheet');
  const handle = document.getElementById('sheetHandle');
  let startY = 0;
  let currentY = 0;
  let isDragging = false;

  const handleStart = (y) => {
    isDragging = true;
    startY = y;
    sheet.style.transition = 'none';
  };

  const handleMove = (y) => {
    if (!isDragging) return;
    currentY = y - startY;
    if (currentY > 0) {
      sheet.style.transform = `translateY(${currentY}px)`;
    }
  };

  const handleEnd = () => {
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = '';
    if (currentY > 100) {
      closeSheet();
    } else {
      sheet.style.transform = '';
    }
    currentY = 0;
  };

  handle.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientY), { passive: true });
  handle.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientY), { passive: true });
  handle.addEventListener('touchend', handleEnd);

  handle.addEventListener('mousedown', (e) => handleStart(e.clientY));
  document.addEventListener('mousemove', (e) => handleMove(e.clientY));
  document.addEventListener('mouseup', handleEnd);
}

// ============================================================
// FAB BADGE (count of unseen reports)
// ============================================================
function updateFabBadge() {
  const badge = document.getElementById('fabBadge');
  if (filteredReports.length > 0) {
    badge.textContent = filteredReports.length;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================
// TOAST
// ============================================================
function showNewReportToast(report) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div>Báo cáo mới: <strong>${esc(report.instrument)}</strong> · ${esc(report.bias)}</div>`;
  toast.onclick = () => {
    selectedId = report.id;
    renderList();
    renderContent();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    toast.remove();
  };
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Don't trigger when typing
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    const idx = filteredReports.findIndex(r => r.id === selectedId);

    if (e.key === 'j' && idx < filteredReports.length - 1) {
      selectedId = filteredReports[idx + 1].id;
      renderList();
      renderContent();
    } else if (e.key === 'k' && idx > 0) {
      selectedId = filteredReports[idx - 1].id;
      renderList();
      renderContent();
    } else if (e.key === '/') {
      e.preventDefault();
      document.getElementById('searchInput')?.focus();
    } else if (e.key === 'Escape') {
      closeSheet();
    }
  });
}

// ============================================================
// SMART POLLING (pause when hidden)
// ============================================================
function startPolling() {
  stopPolling();
  pollTimer = setInterval(() => loadReports(true), 60000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopPolling();
  } else {
    loadReports(true);
    startPolling();
  }
});

// Update relative time every 30s
setInterval(() => {
  if (allReports.length > 0) {
    document.getElementById('lastUpdated').textContent = fmtRelativeTime(allReports[0].datetime);
  }
}, 30000);

// ============================================================
// INIT
// ============================================================
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  if (window.scrollY > 320) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

document.getElementById('fabBtn').addEventListener('click', openSheet);
document.getElementById('sheetClose').addEventListener('click', closeSheet);
document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

setupSheetGestures();
setupKeyboardShortcuts();

loadReports(false);
startPolling();
</script>
