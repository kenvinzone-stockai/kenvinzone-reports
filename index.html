<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KenvinZone — Strategy Desk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #080a0f;
    --bg2: #0d1117;
    --bg3: #111620;
    --bg4: #161c2a;
    --bg5: #1b2232;
    --border: #1e2738;
    --border2: #252f45;
    --gold: #f0b429;
    --gold2: #e09b10;
    --gold-dim: rgba(240,180,41,0.12);
    --gold-glow: rgba(240,180,41,0.25);
    --green: #00d084;
    --green-dim: rgba(0,208,132,0.12);
    --red: #ff4b6e;
    --red-dim: rgba(255,75,110,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --text4: #475569;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(240,180,41,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(59,130,246,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 58px;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.5px;
  }

  .nav-brand::before {
    content: '◆';
    font-size: 11px;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--green-dim);
    border: 1px solid rgba(0,208,132,0.2);
    color: var(--green);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.2s ease infinite;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .layout {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 58px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    background: rgba(13,17,23,0.85);
    backdrop-filter: blur(8px);
  }

  .sidebar-inner {
    position: sticky;
    top: 58px;
    height: calc(100vh - 58px);
    display: flex;
    flex-direction: column;
  }

  .filters {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: grid;
    gap: 12px;
  }

  .filter-block { display: grid; gap: 8px; }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text4);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    border-radius: 999px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .chip:hover { color: var(--gold); border-color: var(--gold); }

  .chip.active {
    color: var(--gold);
    border-color: var(--gold);
    background: var(--gold-dim);
    box-shadow: 0 0 12px var(--gold-glow);
  }

  /* Month selector */
  .month-selector {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-select {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    outline: none;
  }

  .month-select:focus { border-color: var(--gold); }

  /* Time filter tabs */
  .time-filter {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 4px;
  }

  .tf-btn {
    flex: 1;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s ease;
  }

  .tf-btn:hover { color: var(--gold); border-color: var(--gold); }
  .tf-btn.active { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }

  .report-list {
    flex: 1;
    overflow: auto;
    padding: 12px;
    display: grid;
    gap: 8px;
    align-content: start;
  }

  /* Date group header */
  .date-group-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text4);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .date-group-header:first-child { margin-top: 0; }

  .report-count {
    float: right;
    background: var(--bg4);
    border-radius: 999px;
    padding: 1px 6px;
    font-size: 9px;
  }

  .report-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .report-item:hover { border-color: var(--gold); transform: translateY(-1px); }

  .report-item.active {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(240,180,41,0.06) 0%, var(--bg3) 100%);
    box-shadow: 0 0 20px rgba(240,180,41,0.08);
  }

  .ri-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .ri-inst { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
  .ri-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text4); }

  .ri-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

  .badge {
    padding: 2px 7px;
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    border: 1px solid var(--border2);
  }

  .badge.bullish { color: var(--green); background: var(--green-dim); border-color: rgba(0,208,132,0.25); }
  .badge.bearish { color: var(--red); background: var(--red-dim); border-color: rgba(255,75,110,0.25); }
  .badge.neutral { color: var(--blue); background: var(--blue-dim); border-color: rgba(59,130,246,0.25); }
  .badge.conf { color: var(--gold); background: var(--gold-dim); border-color: rgba(240,180,41,0.25); }

  .ri-text {
    color: var(--text3);
    font-size: 11px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .content { min-width: 0; }

  .content-inner {
    max-width: 1180px;
    padding: 20px;
    margin: 0 auto;
    display: grid;
    gap: 18px;
  }

  .loading, .empty {
    min-height: calc(100vh - 140px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .spinner {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    border-top-color: var(--gold);
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hero {
    background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .hero-inner {
    padding: 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: start;
  }

  .hero-line {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .hero-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: -1px;
    color: var(--text);
  }

  .hero-pill {
    padding: 4px 10px;
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    border: 1px solid var(--border2);
    color: var(--text3);
    background: var(--bg2);
  }

  .hero-pill.bullish { color: var(--green); background: var(--green-dim); border-color: rgba(0,208,132,0.25); }
  .hero-pill.bearish { color: var(--red); background: var(--red-dim); border-color: rgba(255,75,110,0.25); }
  .hero-pill.neutral { color: var(--blue); background: var(--blue-dim); border-color: rgba(59,130,246,0.25); }
  .hero-pill.conf-high { color: var(--gold); background: var(--gold-dim); border-color: rgba(240,180,41,0.25); }
  .hero-pill.conf-medium { color: var(--blue); background: var(--blue-dim); border-color: rgba(59,130,246,0.25); }
  .hero-pill.conf-low { color: var(--text3); background: var(--bg2); }

  .hero-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text4);
    margin-bottom: 14px;
  }

  .hero-insight { color: var(--text2); line-height: 1.8; max-width: 760px; font-size: 14px; }

  .hero-price { text-align: right; }

  .hero-price-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .hero-price-value {
    font-family: 'DM Mono', monospace;
    font-size: 38px;
    color: var(--gold);
    text-shadow: 0 0 28px rgba(240,180,41,0.25);
  }

  .hero-price-time {
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text4);
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel-body { padding: 20px 22px; }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .panel-title::before {
    content: '';
    width: 3px; height: 12px;
    border-radius: 2px;
    background: var(--gold);
  }

  .summary-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }

  .summary-box, .mini-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .summary-box p, .mini-box p { color: var(--text2); line-height: 1.8; font-size: 14px; }

  .mini-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text4);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .mini-kv { display: grid; gap: 8px; }
  .mini-kv div { color: var(--text2); font-size: 13px; line-height: 1.6; }
  .mini-kv strong { color: var(--gold); }

  .scenarios-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .scenario-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .scenario-card.primary { border-color: rgba(240,180,41,0.35); background: linear-gradient(135deg, rgba(240,180,41,0.05) 0%, var(--bg3) 100%); }
  .scenario-card.alternative { border-color: rgba(59,130,246,0.25); }
  .scenario-card.invalidation { border-color: rgba(255,75,110,0.25); }

  .scenario-type { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .scenario-type.primary { color: var(--gold); }
  .scenario-type.alternative { color: var(--blue); }
  .scenario-type.invalidation { color: var(--red); }

  .scenario-bias {
    display: inline-block;
    margin-bottom: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
  }

  .scenario-bias.bullish { color: var(--green); background: var(--green-dim); }
  .scenario-bias.bearish { color: var(--red); background: var(--red-dim); }
  .scenario-bias.neutral { color: var(--blue); background: var(--blue-dim); }

  .scenario-setup { color: var(--text2); line-height: 1.65; font-size: 13px; margin-bottom: 14px; }

  .scenario-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; margin-bottom: 12px; }

  .stat-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .stat-value { font-size: 13px; color: var(--text); line-height: 1.5; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.gold { color: var(--gold); }

  .prob-wrap { margin-top: 8px; }
  .prob-head { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text4); margin-bottom: 6px; }
  .prob-track { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .prob-fill { height: 100%; width: 0; transition: width 0.9s ease; }
  .prob-fill.primary { background: linear-gradient(90deg, var(--gold2), var(--gold)); }
  .prob-fill.alternative { background: var(--blue); }
  .prob-fill.invalidation { background: var(--red); }

  .triple-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .tf-table { width: 100%; border-collapse: collapse; }
  .tf-table tr { border-bottom: 1px solid var(--border); }
  .tf-table tr:last-child { border-bottom: none; }
  .tf-table td { padding: 10px 12px; vertical-align: top; }

  .tf-name { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); width: 52px; }

  .tf-trend {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    margin-right: 8px;
  }

  .tf-trend.bullish { color: var(--green); background: var(--green-dim); }
  .tf-trend.bearish { color: var(--red); background: var(--red-dim); }
  .tf-trend.neutral { color: var(--blue); background: var(--blue-dim); }

  .tf-desc { color: var(--text2); font-size: 12px; line-height: 1.5; }

  .levels { display: grid; gap: 8px; }

  .level {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    border: 1px solid var(--border);
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.resistance { background: var(--red); box-shadow: 0 0 8px rgba(255,75,110,0.5); }
  .dot.support { background: var(--green); box-shadow: 0 0 8px rgba(0,208,132,0.5); }
  .dot.current { background: var(--gold); box-shadow: 0 0 8px rgba(240,180,41,0.5); }

  .level-type { width: 76px; font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; color: var(--text4); }
  .level-price { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }

  .list-stack { display: grid; gap: 8px; }

  .list-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text2);
    font-size: 13px;
    line-height: 1.6;
  }

  .list-item.bull { border-color: rgba(0,208,132,0.14); background: rgba(0,208,132,0.05); }
  .list-item.bear { border-color: rgba(255,75,110,0.14); background: rgba(255,75,110,0.05); }
  .list-item.risk { border-color: rgba(255,75,110,0.14); background: rgba(255,75,110,0.05); }

  .matrix { width: 100%; border-collapse: collapse; }
  .matrix th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text4); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
  .matrix td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text2); font-size: 12px; vertical-align: top; }
  .matrix tr:last-child td { border-bottom: none; }

  .exec-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 14px; }

  .exec-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .exec-key { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .exec-val { color: var(--text); font-size: 13px; line-height: 1.6; }

  .checklist { display: grid; gap: 8px; }

  .check {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    cursor: pointer;
  }

  .check:hover { background: var(--bg4); }

  .check-box {
    width: 16px; height: 16px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
    font-size: 10px;
    flex-shrink: 0;
  }

  .check.checked .check-box { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 700; }
  .check.checked .check-text { text-decoration: line-through; color: var(--text4); }
  .check-text { color: var(--text2); font-size: 13px; }

  .scroll-top {
    position: fixed;
    right: 22px; bottom: 22px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(240,180,41,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 99;
    font-size: 16px;
  }

  .scroll-top.visible { opacity: 1; pointer-events: auto; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }

  .stat-pill span { color: var(--text2); font-weight: 500; }

  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar-inner { position: static; height: auto; }
    .report-list { max-height: 300px; }
    .summary-grid, .scenarios-grid, .triple-grid, .dual-grid { grid-template-columns: 1fr; }
    .hero-inner { grid-template-columns: 1fr; }
    .hero-price { text-align: left; }
  }

  @media (max-width: 640px) {
    .nav, .content-inner { padding-left: 12px; padding-right: 12px; }
    .hero-inner, .panel-body { padding: 16px; }
    .hero-title { font-size: 26px; }
    .hero-price-value { font-size: 30px; }
  }
</style>
</head>
<body>
  <div class="nav">
    <div class="nav-brand">KenvinZone</div>
    <div class="nav-right">
      <div class="live-pill"><span class="live-dot"></span>TRỰC TIẾP</div>
      <div class="last-updated" id="lastUpdated">—</div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-inner">

        <!-- Month selector -->
        <div class="month-selector">
          <select class="month-select" id="monthSelect">
            <option value="">Đang tải...</option>
          </select>
        </div>

        <!-- Time filter -->
        <div class="time-filter">
          <button class="tf-btn active" data-time="all">Tất cả</button>
          <button class="tf-btn" data-time="today">Hôm nay</button>
          <button class="tf-btn" data-time="week">Tuần này</button>
          <button class="tf-btn" data-time="month">Tháng này</button>
        </div>

        <!-- Instrument + Bias filters -->
        <div class="filters">
          <div class="filter-block">
            <div class="filter-label">Instrument</div>
            <div class="filter-row" id="instrumentFilters">
              <button class="chip active" data-type="instrument" data-value="all">Tất cả</button>
            </div>
          </div>
          <div class="filter-block">
            <div class="filter-label">Bias</div>
            <div class="filter-row" id="biasFilters">
              <button class="chip active" data-type="bias" data-value="all">Tất cả</button>
              <button class="chip" data-type="bias" data-value="bullish">Bullish</button>
              <button class="chip" data-type="bias" data-value="bearish">Bearish</button>
              <button class="chip" data-type="bias" data-value="neutral">Neutral</button>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar">
          <div class="stat-pill">Tổng: <span id="statTotal">0</span></div>
          <div class="stat-pill">Bullish: <span id="statBull" style="color:var(--green)">0</span></div>
          <div class="stat-pill">Bearish: <span id="statBear" style="color:var(--red)">0</span></div>
        </div>

        <div class="report-list" id="reportList">
          <div class="loading"><div class="spinner"></div><div>Đang tải báo cáo…</div></div>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner" id="content">
        <div class="loading"><div class="spinner"></div><div>Đang tải dữ liệu thị trường…</div></div>
      </div>
    </main>
  </div>

  <div class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
// ============================================================
// UTILS
// ============================================================
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeStr(v, fallback='—') {
  if (v === null || v === undefined || v === '') return fallback;
  if (typeof v === 'object') return JSON.stringify(v);
  return String(v);
}
function safeObj(v) { return v && typeof v === 'object' && !Array.isArray(v) ? v : {}; }
function safeArr(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string' && v.trim()) return [v];
  if (v && typeof v === 'object') return Object.values(v);
  return [];
}

function normalizeInstrument(inst) {
  const s = String(inst || '').toUpperCase();
  if (!s) return 'N/A';
  if (s.includes('XAU')) return 'XAUUSD';
  if (s.includes('NQ') || s.includes('US100') || s.includes('NAS') || s.includes('USTEC') || s.includes('USATEC')) return 'NQ / US100';
  if (s.includes('VN') || s.includes('VNINDEX')) return 'VNINDEX';
  return inst;
}

function getBiasClass(bias) {
  const b = String(bias || '').toLowerCase();
  if (b.includes('bull') || b.includes('long') || b.includes('up')) return 'bullish';
  if (b.includes('bear') || b.includes('short') || b.includes('down')) return 'bearish';
  return 'neutral';
}

function getConfidenceClass(v) {
  if (typeof v === 'number') {
    if (v >= 70) return 'conf-high';
    if (v >= 45) return 'conf-medium';
    return 'conf-low';
  }
  const s = String(v || '').toLowerCase();
  if (s.includes('high') || s.includes('strong') || s.includes('cao')) return 'conf-high';
  if (s.includes('med') || s.includes('trung')) return 'conf-medium';
  return 'conf-low';
}

function fmtTs(ts) {
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    return d.toLocaleString('vi-VN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch { return String(ts); }
}

function fmtPrice(v) {
  const n = Number(v);
  if (Number.isFinite(n)) return n.toLocaleString('vi-VN', { minimumFractionDigits:0, maximumFractionDigits:2 });
  return safeStr(v);
}

function probValue(v) {
  if (v === null || v === undefined || v === '') return 0;
  const n = Number(v);
  if (!Number.isNaN(n)) return n > 1 ? n : n * 100;
  const m = String(v).match(/(\d+(\.\d+)?)/);
  return m ? Number(m[1]) : 0;
}

function textArray(v) {
  return safeArr(v).map(item => {
    if (typeof item === 'object') return safeStr(item.factor || item.description || item.name || item.title || item.event || item);
    return safeStr(item);
  });
}

// ============================================================
// MONTH FILE MANAGEMENT
// ============================================================
function getMonthKey(date) {
  const d = new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  return `${y}-${m}`;
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  const months = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function getDataUrl(monthKey) {
  if (!monthKey) {
    // fallback to old reports.json
    return 'reports.json';
  }
  return `reports-${monthKey}.json`;
}

function getCurrentMonthKey() {
  return getMonthKey(new Date());
}

// Generate list of months to try (current + past 6)
function getMonthsToCheck() {
  const months = [];
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(getMonthKey(d));
  }
  return months;
}

// ============================================================
// STATE
// ============================================================
let allReports = [];
let filteredReports = [];
let selectedId = null;
let filters = { instrument: 'all', bias: 'all', time: 'all' };
let availableMonths = [];
let currentMonth = getCurrentMonthKey();

// ============================================================
// NORMALIZE REPORT
// ============================================================
function normalizeScenario(key, v) {
  const s = safeObj(v);
  if (!Object.keys(s).length) return null;
  return {
    key,
    bias: safeStr(s.bias || s.direction || s.type || key),
    setup: safeStr(s.setup || s.condition || s.trigger || s.description || s.action || '—'),
    target: Array.isArray(s.target) ? s.target.map(fmtPrice).join(' → ') : safeStr(s.target || s.targets || s.take_profit || s.tp || '—'),
    stop: safeStr(s.stop_loss || s.stop || s.sl || '—'),
    rr: safeStr(s.risk_reward || s.rr || s.ratio || '—'),
    probability: probValue(s.probability || s.prob || 0)
  };
}

function normalizeReport(r) {
  let raw = r.raw !== undefined ? r.raw : r;
  if (typeof raw === 'string') {
    try { raw = JSON.parse(raw); } catch(e) { console.error('Parse raw error', e); return null; }
  }
  if (!raw || typeof raw !== 'object') return null;

  const summary = safeObj(raw.summary || raw.executive_summary || raw.executiveSummary);
  const structure = safeObj(raw.market_structure || raw.multi_timeframe_analysis || raw.multiTimeframeAnalysis);
  const confluence = safeObj(raw.confluence_analysis || raw.bias_logic);
  const scenariosObj = safeObj(raw.trading_scenarios || raw.scenario_matrix || raw.scenarios);
  const execution = safeObj(raw.execution_plan || raw.trading_strategy);
  const keyLevels = safeObj(raw.key_levels || raw.keyLevels);
  const checklist = safeObj(raw.action_checklist || raw.actionChecklist);

  const instrument = normalizeInstrument(r.instrument || summary.instrument || raw.instrument || raw.metadata?.instrument);
  const price = r.price_current || summary.current_price || keyLevels.currentPrice || keyLevels.current_price || 0;
  const bias = safeStr(summary.primary_bias || summary.bias_direction || summary.bias || raw.bias_primary || raw.bias || 'Neutral');
  const confidence = summary.confidence_level || summary.confidence || raw.confidence || raw.confidence_level || 'N/A';

  const tfRows = ['D1','H4','H1','M15'].map(tf => {
    const d = safeObj(structure[tf] || structure[tf.toLowerCase()]);
    if (!Object.keys(d).length) return null;
    return {
      tf,
      trend: safeStr(d.bias || d.trend || '—'),
      description: [
        safeStr(d.structure || '', ''),
        safeStr(d.market_structure || '', ''),
        safeStr(d.intraday_story || '', ''),
        safeStr(d.key_levels || '', ''),
        safeStr(d.momentum || '', ''),
        safeStr(d.trigger_setup || '', '')
      ].filter(x => x && x !== '—').join(' · ')
    };
  }).filter(Boolean);

  const scenarios = [
    normalizeScenario('primary_scenario', scenariosObj.primary_scenario),
    normalizeScenario('alternative_scenario', scenariosObj.alternative_scenario),
    normalizeScenario('invalidation_scenario', scenariosObj.invalidation_scenario)
  ].filter(Boolean);

  const datetime = r.datetime || raw.timestamp || new Date().toISOString();

  return {
    id: r.id || `RPT-${Date.now()}`,
    instrument,
    price,
    priceFmt: fmtPrice(price),
    bias,
    biasClass: getBiasClass(bias),
    confidence,
    confidenceClass: getConfidenceClass(confidence),
    insight: safeStr(summary.key_insight || summary.summary || summary.headline || raw.dashboard_summary || raw.telegram_summary || '—'),
    archetype: safeStr(r.archetype || raw.archetype || raw.metadata?.archetype || 'Báo cáo tự động'),
    datetime,
    dateDisplay: r.date_display || fmtTs(datetime).split(' ')[0],
    timeDisplay: r.time_display || (fmtTs(datetime).split(' ')[1] || '—'),
    dateObj: new Date(datetime),
    monthKey: getMonthKey(datetime),
    resistance: safeArr(structure.H4?.critical_levels?.resistance || keyLevels.resistance || keyLevels.resistances || []).map(fmtPrice),
    support: safeArr(structure.H4?.critical_levels?.support || keyLevels.support || keyLevels.supports || []).map(fmtPrice),
    tfRows,
    bullish: textArray(confluence.bullish_confluence || confluence.bullish_factors || []),
    bearish: textArray(confluence.bearish_confluence || confluence.bearish_factors || []),
    risks: textArray(raw.risk_factors || raw.risk_assessment || []),
    catalysts: textArray(raw.catalyst_watch || raw.catalyst_context || raw.market_context || []),
    execution,
    actionItems: [
      ...textArray(checklist.immediate || []),
      ...textArray(checklist.pre_trade || []),
      ...textArray(checklist.monitoring || []),
      ...textArray(execution.action_plan || execution.actions || execution.checklist || [])
    ],
    scenarios,
    primaryScenario: scenarios.find(x => x.key === 'primary_scenario') || null,
    alternativeScenario: scenarios.find(x => x.key === 'alternative_scenario') || null,
    invalidationScenario: scenarios.find(x => x.key === 'invalidation_scenario') || null,
    docx: r.docx_url || ''
  };
}

// ============================================================
// LOAD DATA — từ reports.json + history.json + localStorage backup
// ============================================================
const MAX_REPORTS = 50;
const STORAGE_KEY = 'kenvinzone_reports_v2';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveToStorage(reports) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(reports.slice(0, MAX_REPORTS)));
  } catch(e) {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e2) {}
  }
}

async function tryFetch(url) {
  try {
    const res = await fetch(url + '?t=' + Date.now());
    if (!res.ok) return [];
    const json = await res.json();
    if (Array.isArray(json)) return json;
    if (Array.isArray(json.reports)) return json.reports;
    return [json];
  } catch(e) { return []; }
}

async function loadReports() {
  // Load song song: reports.json mới + history.json tích lũy
  const [freshRaw, historyRaw] = await Promise.all([
    tryFetch('reports.json'),
    tryFetch('history.json')
  ]);

  // Load thêm từ localStorage làm backup
  const storedRaw = loadFromStorage();

  // Merge tất cả: mới nhất trước, deduplicate theo id
  const seen = new Set();
  const mergedRaw = [...freshRaw, ...historyRaw, ...storedRaw].filter(r => {
    const id = r.id || r.datetime;
    if (!id || seen.has(id)) return false;
    seen.add(id);
    return true;
  }).slice(0, MAX_REPORTS);

  // Lưu lại vào localStorage làm backup
  saveToStorage(mergedRaw);

  // Normalize để hiển thị
  const seen2 = new Set();
  allReports = mergedRaw.map(normalizeReport).filter(Boolean)
    .filter(r => {
      if (seen2.has(r.id)) return false;
      seen2.add(r.id);
      return true;
    })
    .sort((a, b) => new Date(b.datetime) - new Date(a.datetime));

  // Build available months
  const monthSet = new Set(allReports.map(r => r.monthKey));
  availableMonths = [...monthSet].sort().reverse();

  // Update month selector
  updateMonthSelector();

  if (allReports.length > 0) {
    document.getElementById('lastUpdated').textContent = fmtTs(allReports[0].datetime);
  }

  renderFilters();
  applyFilters();

  if (!selectedId && filteredReports.length) selectedId = filteredReports[0].id;
  if (filteredReports.length && !filteredReports.some(r => r.id === selectedId)) selectedId = filteredReports[0].id;

  renderList();
  renderContent();
  updateStats();
}

function updateMonthSelector() {
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = `<option value="all">📅 Tất cả tháng</option>` +
    availableMonths.map(mk => `<option value="${mk}" ${mk === currentMonth ? 'selected' : ''}>${getMonthLabel(mk)}</option>`).join('');
}

// ============================================================
// FILTER LOGIC
// ============================================================
function isInTimeRange(r, range) {
  const now = new Date();
  const d = r.dateObj;
  if (range === 'today') {
    return d.toDateString() === now.toDateString();
  }
  if (range === 'week') {
    const weekAgo = new Date(now);
    weekAgo.setDate(weekAgo.getDate() - 7);
    return d >= weekAgo;
  }
  if (range === 'month') {
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }
  return true;
}

function applyFilters() {
  const monthFilter = document.getElementById('monthSelect')?.value || 'all';
  
  filteredReports = allReports.filter(r => {
    if (filters.instrument !== 'all' && r.instrument !== filters.instrument) return false;
    if (filters.bias !== 'all' && r.biasClass !== filters.bias) return false;
    if (filters.time !== 'all' && !isInTimeRange(r, filters.time)) return false;
    if (monthFilter !== 'all' && r.monthKey !== monthFilter) return false;
    return true;
  });
}

function updateStats() {
  document.getElementById('statTotal').textContent = filteredReports.length;
  document.getElementById('statBull').textContent = filteredReports.filter(r => r.biasClass === 'bullish').length;
  document.getElementById('statBear').textContent = filteredReports.filter(r => r.biasClass === 'bearish').length;
}

// ============================================================
// RENDER FILTERS
// ============================================================
function renderFilters() {
  const instWrap = document.getElementById('instrumentFilters');
  const instruments = [...new Set(allReports.map(r => r.instrument).filter(Boolean))];

  instWrap.innerHTML = `
    <button class="chip ${filters.instrument === 'all' ? 'active' : ''}" data-type="instrument" data-value="all">Tất cả</button>
    ${instruments.map(inst => `<button class="chip ${filters.instrument === inst ? 'active' : ''}" data-type="instrument" data-value="${esc(inst)}">${esc(inst)}</button>`).join('')}
  `;

  document.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      const value = btn.dataset.value;
      filters[type] = value;
      if (type === 'instrument') document.querySelectorAll('#instrumentFilters .chip').forEach(x => x.classList.remove('active'));
      else document.querySelectorAll('#biasFilters .chip').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
      selectedId = filteredReports.length ? filteredReports[0].id : null;
      renderList();
      renderContent();
      updateStats();
    });
  });

  // Time filter buttons
  document.querySelectorAll('.tf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filters.time = btn.dataset.time;
      document.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
      selectedId = filteredReports.length ? filteredReports[0].id : null;
      renderList();
      renderContent();
      updateStats();
    });
  });

  // Month select
  document.getElementById('monthSelect').addEventListener('change', () => {
    applyFilters();
    selectedId = filteredReports.length ? filteredReports[0].id : null;
    renderList();
    renderContent();
    updateStats();
  });
}

// ============================================================
// RENDER LIST (grouped by date)
// ============================================================
function renderList() {
  const wrap = document.getElementById('reportList');
  if (!filteredReports.length) {
    wrap.innerHTML = `<div class="empty" style="min-height:100px">Không có báo cáo phù hợp</div>`;
    return;
  }

  // Group by date
  const groups = {};
  filteredReports.forEach(r => {
    const key = r.dateDisplay;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  let html = '';
  Object.entries(groups).forEach(([date, reports]) => {
    html += `<div class="date-group-header">${esc(date)} <span class="report-count">${reports.length}</span></div>`;
    reports.forEach(r => {
      html += `
        <div class="report-item ${r.id === selectedId ? 'active' : ''}" data-id="${esc(r.id)}">
          <div class="ri-top">
            <div class="ri-inst">${esc(r.instrument)}</div>
            <div class="ri-time">${esc(r.timeDisplay)}</div>
          </div>
          <div class="ri-badges">
            <span class="badge ${r.biasClass}">${esc(r.bias)}</span>
            <span class="badge conf">${esc(safeStr(r.confidence, 'N/A'))}</span>
          </div>
          <div class="ri-text">${esc(r.insight)}</div>
        </div>
      `;
    });
  });

  wrap.innerHTML = html;

  document.querySelectorAll('.report-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedId = el.dataset.id;
      renderList();
      renderContent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

// ============================================================
// RENDER CONTENT
// ============================================================
function scenarioCard(label, cls, s) {
  if (!s) return `
    <div class="scenario-card ${cls}">
      <div class="scenario-type ${cls}">${esc(label)}</div>
      <div style="color:var(--text4);font-size:12px">Không có dữ liệu</div>
    </div>`;

  return `
    <div class="scenario-card ${cls}">
      <div class="scenario-type ${cls}">${esc(label)}</div>
      <div class="scenario-bias ${getBiasClass(s.bias)}">${esc(s.bias)}</div>
      <div class="scenario-setup">${esc(s.setup)}</div>
      <div class="scenario-stats">
        <div><div class="stat-label">Mục tiêu</div><div class="stat-value green">${esc(s.target)}</div></div>
        <div><div class="stat-label">Cắt lỗ</div><div class="stat-value red">${esc(s.stop)}</div></div>
        <div><div class="stat-label">R / R</div><div class="stat-value gold">${esc(s.rr)}</div></div>
      </div>
      <div class="prob-wrap">
        <div class="prob-head"><span>Xác suất</span><span>${Math.round(s.probability || 0)}%</span></div>
        <div class="prob-track"><div class="prob-fill ${cls}" data-pct="${Math.min(Math.round(s.probability||0),100)}"></div></div>
      </div>
    </div>`;
}

function renderContent() {
  const container = document.getElementById('content');
  const r = filteredReports.find(x => x.id === selectedId);

  if (!r) {
    container.innerHTML = `<div class="empty"><div>Chọn một báo cáo từ danh sách bên trái</div></div>`;
    return;
  }

  const tfRows = r.tfRows.length ? r.tfRows.map(row => `
    <tr>
      <td class="tf-name">${esc(row.tf)}</td>
      <td>
        <span class="tf-trend ${getBiasClass(row.trend)}">${esc(row.trend)}</span>
        <span class="tf-desc">${esc(row.description || '—')}</span>
      </td>
    </tr>`).join('') : `<tr><td colspan="2" class="tf-desc">Không có dữ liệu</td></tr>`;

  const levelItems = [
    ...r.resistance.map(v => ({ type:'Kháng cự', cls:'resistance', price:v })),
    { type:'Hiện tại', cls:'current', price:r.priceFmt, desc:'Giá hiện tại' },
    ...r.support.map(v => ({ type:'Hỗ trợ', cls:'support', price:v }))
  ];

  const matrixRows = r.scenarios.length ? r.scenarios.map(s => `
    <tr>
      <td>${esc(s.key)}</td>
      <td><span class="scenario-bias ${getBiasClass(s.bias)}">${esc(s.bias)}</span></td>
      <td>${esc(s.setup)}</td>
      <td>${esc(s.target)}</td>
      <td>${esc(s.stop)}</td>
      <td>${esc(s.rr)}</td>
      <td>${Math.round(s.probability||0)}%</td>
    </tr>`).join('') : `<tr><td colspan="7">Không có dữ liệu</td></tr>`;

  const execEntries = Object.entries(r.execution).filter(([k]) => !['key_levels','checklist','action_plan','actions'].includes(k));

  container.innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-main">
          <div class="hero-line">
            <div class="hero-title">${esc(r.instrument)}</div>
            <div class="hero-pill">${esc(r.archetype)}</div>
            <div class="hero-pill ${r.biasClass}">${esc(r.bias)}</div>
            <div class="hero-pill ${r.confidenceClass}">${esc(safeStr(r.confidence,'N/A'))}</div>
          </div>
          <div class="hero-meta">
            <span>${esc(r.dateDisplay)}</span>
            <span>${esc(r.timeDisplay)} UTC+7</span>
            <span>${esc(r.id)}</span>
          </div>
          <div class="hero-insight">${esc(r.insight)}</div>
        </div>
        <div class="hero-price">
          <div class="hero-price-label">Giá hiện tại</div>
          <div class="hero-price-value">${esc(r.priceFmt)}</div>
          <div class="hero-price-time">${esc(fmtTs(r.datetime))}</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-body">
        <div class="panel-title">Tóm tắt điều hành</div>
        <div class="summary-grid">
          <div class="summary-box"><p>${esc(r.insight)}</p></div>
          <div class="mini-box">
            <div class="mini-title">Snapshot</div>
            <div class="mini-kv">
              <div><strong>Bias:</strong> ${esc(r.bias)}</div>
              <div><strong>Confidence:</strong> ${esc(safeStr(r.confidence,'N/A'))}</div>
              <div><strong>Instrument:</strong> ${esc(r.instrument)}</div>
              <div><strong>Price:</strong> ${esc(r.priceFmt)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-body">
        <div class="panel-title">Kịch bản giao dịch</div>
        <div class="scenarios-grid">
          ${scenarioCard('★ Kịch bản chính','primary',r.primaryScenario)}
          ${scenarioCard('◈ Kịch bản thay thế','alternative',r.alternativeScenario)}
          ${scenarioCard('✕ Vô hiệu hóa','invalidation',r.invalidationScenario)}
        </div>
      </div>
    </div>

    <div class="triple-grid">
      <div class="panel">
        <div class="panel-body">
          <div class="panel-title">Đa khung thời gian</div>
          <table class="tf-table"><tbody>${tfRows}</tbody></table>
        </div>
      </div>
      <div class="panel">
        <div class="panel-body">
          <div class="panel-title">Vùng giá quan trọng</div>
          <div class="levels">
            ${levelItems.map(i => `
              <div class="level">
                <span class="dot ${i.cls}"></span>
                <span class="level-type">${esc(i.type)}</span>
                <span class="level-price">${esc(i.price)}</span>
                ${i.desc ? `<span style="color:var(--text4);font-size:11px">${esc(i.desc)}</span>` : ''}
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-body">
          <div class="panel-title">Radar rủi ro</div>
          <div class="list-stack">
            ${(r.risks.length ? r.risks : ['Không có rủi ro nào']).map(x => `<div class="list-item risk">${esc(x)}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="dual-grid">
      <div class="panel">
        <div class="panel-body">
          <div class="panel-title">Yếu tố hỗ trợ / áp lực</div>
          <div class="dual-grid" style="gap:16px">
            <div>
              <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--green);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">▲ Hỗ trợ tăng</div>
              <div class="list-stack">${(r.bullish.length ? r.bullish : ['Không có']).map(x => `<div class="list-item bull">${esc(x)}</div>`).join('')}</div>
            </div>
            <div>
              <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">▼ Áp lực giảm</div>
              <div class="list-stack">${(r.bearish.length ? r.bearish : ['Không có']).map(x => `<div class="list-item bear">${esc(x)}</div>`).join('')}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-body">
          <div class="panel-title">Sự kiện cần theo dõi</div>
          <div class="list-stack">
            ${(r.catalysts.length ? r.catalysts : ['Không có sự kiện']).map(x => `<div class="list-item">${esc(x)}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-body">
        <div class="panel-title">Scenario matrix</div>
        <table class="matrix">
          <thead>
            <tr>
              <th>Type</th><th>Bias</th><th>Setup</th><th>Target</th><th>Stop</th><th>R/R</th><th>Probability</th>
            </tr>
          </thead>
          <tbody>${matrixRows}</tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="panel-body">
        <div class="panel-title">Action plan</div>
        ${execEntries.length ? `
          <div class="exec-grid">
            ${execEntries.map(([k,v]) => `
              <div class="exec-card">
                <div class="exec-key">${esc(k.replaceAll('_',' '))}</div>
                <div class="exec-val">${esc(typeof v === 'object' ? JSON.stringify(v) : safeStr(v))}</div>
              </div>`).join('')}
          </div>` : ''}
        <div class="checklist">
          ${(r.actionItems.length ? r.actionItems : [
            'Confirm bias alignment across timeframes',
            'Check confluence factors',
            'Verify key level proximity',
            'Set entry order',
            'Place stop loss',
            'Define take profit targets',
            'Monitor catalyst events'
          ]).map(x => `
            <div class="check" onclick="this.classList.toggle('checked')">
              <div class="check-box">✓</div>
              <div class="check-text">${esc(x)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;

  setTimeout(() => {
    document.querySelectorAll('.prob-fill[data-pct]').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 60);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  if (window.scrollY > 320) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

loadReports();
setInterval(loadReports, 60000);
</script>
</body>
</html>
