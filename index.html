<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KenvinZone – Báo Cáo Chiến Lược</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #07080C;
  --bg-1: #0C0E15;
  --bg-2: #10131C;
  --bg-3: #161A26;
  --bg-4: #1C2130;

  --gold: #D4A843;
  --gold-bright: #EAC86A;
  --gold-muted: rgba(212,168,67,0.12);
  --gold-subtle: rgba(212,168,67,0.06);
  --gold-border: rgba(212,168,67,0.22);

  --teal: #2BCFBD;
  --teal-muted: rgba(43,207,189,0.1);

  --red: #F05252;
  --red-muted: rgba(240,82,82,0.1);
  --red-border: rgba(240,82,82,0.25);

  --green: #2DD45A;
  --green-muted: rgba(45,212,90,0.1);
  --green-border: rgba(45,212,90,0.25);

  --amber: #F0A030;
  --amber-muted: rgba(240,160,48,0.1);
  --amber-border: rgba(240,160,48,0.25);

  --text-primary: #EEE9E2;
  --text-secondary: #8A8070;
  --text-tertiary: #4A4540;

  --border-subtle: rgba(255,255,255,0.055);
  --border-light: rgba(255,255,255,0.09);
  --border-medium: rgba(255,255,255,0.13);

  --sidebar-w: 268px;
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 5px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg-0);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(212,168,67,0.03) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-1);
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 24px 20px 18px;
  border-bottom: 1px solid var(--border-subtle);
  position: relative;
}

.logo-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.22em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.8;
}

.logo-name {
  font-family: 'Syne', sans-serif;
  font-size: 21px; font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1;
}

.logo-badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 7px;
  padding: 3px 8px;
  background: var(--gold-subtle);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius-xs);
  font-size: 10px; color: var(--gold);
  letter-spacing: 0.06em;
}

.logo-badge::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.75); }
}

.filter-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.filter-label {
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 9px;
}

.filter-row { display: flex; flex-wrap: wrap; gap: 5px; }

.filter-chip {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-tertiary);
  font-family: 'Manrope', sans-serif;
  font-size: 11px; font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  outline: none;
}

.filter-chip:hover {
  border-color: var(--border-light);
  color: var(--text-secondary);
  background: var(--bg-3);
}

.filter-chip.active {
  background: var(--gold-muted);
  border-color: var(--gold-border);
  color: var(--gold);
}

.report-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px 20px;
}

.report-item {
  padding: 12px 14px;
  margin-bottom: 2px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid transparent;
  position: relative;
  transition: all var(--transition);
  overflow: hidden;
}

.report-item::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 2px; height: 0;
  background: var(--gold);
  border-radius: 0 2px 2px 0;
  transition: height var(--transition);
}

.report-item:hover {
  background: var(--bg-3);
  border-color: var(--border-subtle);
}

.report-item.active {
  background: var(--gold-subtle);
  border-color: var(--gold-border);
}

.report-item.active::before { height: 60%; }

.ri-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }

.ri-ticker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500;
  color: var(--text-primary);
  letter-spacing: 0.03em;
}

.ri-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-tertiary);
}

.ri-row2 { display: flex; align-items: center; gap: 8px; }

.ri-bias-pill {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  display: inline-block;
}

.ri-bias-pill.bearish { background: var(--red-muted); color: var(--red); border: 1px solid var(--red-border); }
.ri-bias-pill.bullish { background: var(--green-muted); color: var(--green); border: 1px solid var(--green-border); }
.ri-bias-pill.neutral { background: var(--amber-muted); color: var(--amber); border: 1px solid var(--amber-border); }

.ri-catalyst {
  font-size: 11px; color: var(--text-tertiary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 160px;
  line-height: 1.3;
}

.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  position: relative; z-index: 1;
}

.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(7,8,12,0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 28px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}

.topbar-left { display: flex; align-items: center; gap: 10px; }

.topbar-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-tertiary);
  padding: 3px 8px;
  background: var(--bg-3);
  border-radius: var(--radius-xs);
  border: 1px solid var(--border-subtle);
}

.topbar-sep { color: var(--text-tertiary); font-size: 14px; }
.topbar-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

.btn-dl {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 16px;
  background: var(--gold-muted);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm);
  color: var(--gold);
  font-family: 'Manrope', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: all var(--transition);
  letter-spacing: 0.02em;
}

.btn-dl:hover {
  background: var(--gold);
  color: var(--bg-0);
  border-color: var(--gold);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(212,168,67,0.25);
}

.btn-dl svg { width: 13px; height: 13px; }

.report-content {
  padding: 28px;
  max-width: 1100px;
}

.hero-card {
  background: var(--bg-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 0;
  margin-bottom: 20px;
  overflow: hidden;
  position: relative;
}

.hero-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
}

.hero-inner { padding: 26px 28px; }

.hero-toprow {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 20px; margin-bottom: 24px;
  flex-wrap: wrap;
}

.hero-instrument-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
}

.hero-instrument {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.03em;
  line-height: 1;
}

.hero-archetype {
  font-size: 10px; font-weight: 600;
  padding: 3px 8px;
  background: var(--bg-4);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hero-datetime {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 6px;
}

.hero-datetime::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 6px var(--teal);
}

.hero-price-block { text-align: right; }

.hero-price-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.hero-price {
  font-family: 'Syne', sans-serif;
  font-size: 42px; font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 55%, rgba(212,168,67,0.7) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-bias-row {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}

.hero-bias-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-tertiary);
}

.hero-bias-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px;
  border-radius: 30px;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.01em;
}

.hero-bias-badge.bearish { background: var(--red-muted); border: 1px solid var(--red-border); color: var(--red); box-shadow: 0 0 20px rgba(240,82,82,0.08); }
.hero-bias-badge.bullish { background: var(--green-muted); border: 1px solid var(--green-border); color: var(--green); box-shadow: 0 0 20px rgba(45,212,90,0.08); }
.hero-bias-badge.neutral { background: var(--amber-muted); border: 1px solid var(--amber-border); color: var(--amber); box-shadow: 0 0 20px rgba(240,160,48,0.08); }

.hero-bias-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.hero-divider { height: 1px; background: var(--border-subtle); margin: 0 0 20px; }

.hero-quote-block { display: flex; gap: 14px; align-items: flex-start; }

.hero-quote-bar {
  width: 2px; flex-shrink: 0; margin-top: 3px;
  background: linear-gradient(180deg, var(--gold), transparent);
  border-radius: 2px; min-height: 40px;
}

.hero-quote-text {
  font-family: 'Manrope', sans-serif;
  font-size: 14px; font-weight: 300;
  color: var(--text-secondary);
  line-height: 1.75;
  font-style: italic;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }

.card {
  background: var(--bg-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  position: relative;
  overflow: hidden;
}

.card:hover {
  border-color: var(--border-light);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  transform: translateY(-1px);
}

.card-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.card-title-dot { width: 3px; height: 14px; background: var(--gold); border-radius: 2px; flex-shrink: 0; }
.card-prominent { background: var(--bg-3); border-color: var(--border-light); }

.tf-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }

.tf-item {
  background: var(--bg-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  text-align: center;
  transition: all var(--transition);
}

.tf-item:hover { background: var(--bg-3); border-color: var(--border-light); }

.tf-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--gold);
  margin-bottom: 7px;
  letter-spacing: 0.06em;
}

.tf-bias { font-size: 12px; font-weight: 500; color: var(--text-secondary); line-height: 1.4; }

.levels-wrap { display: flex; flex-direction: column; gap: 2px; }

.level-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}

.level-row:hover { background: var(--bg-3); }
.level-type-wrap { display: flex; align-items: center; gap: 8px; }

.level-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.level-dot.resist { background: var(--red); box-shadow: 0 0 6px rgba(240,82,82,0.5); }
.level-dot.support { background: var(--green); box-shadow: 0 0 6px rgba(45,212,90,0.5); }
.level-dot.current { background: var(--gold); box-shadow: 0 0 6px rgba(212,168,67,0.5); }

.level-type { font-size: 11px; font-weight: 500; min-width: 72px; }
.level-type.resist { color: var(--red); }
.level-type.support { color: var(--green); }
.level-type.current { color: var(--gold); }

.level-price { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text-primary); }
.level-row.is-current .level-price { font-size: 16px; }
.level-divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }

.scenario-table { display: flex; flex-direction: column; gap: 3px; }

.scen-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}

.scen-row:hover { background: var(--bg-3); }
.scen-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--gold); min-width: 26px; }
.scen-name { flex: 1; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.scen-zone { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-tertiary); max-width: 140px; text-align: right; }
.scen-prob-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.scen-prob-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-primary); }
.prob-track { width: 56px; height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.prob-fill { height: 100%; background: var(--gold); border-radius: 2px; }

.catalyst-block {
  background: var(--teal-muted);
  border: 1px solid rgba(43,207,189,0.15);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 13px; font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.7;
  position: relative;
}

.catalyst-block::before {
  content: '';
  position: absolute; left: 0; top: 12px; bottom: 12px;
  width: 2px; background: var(--teal); border-radius: 2px;
}

.summary-text { font-size: 14px; font-weight: 400; color: var(--text-secondary); line-height: 1.8; }
.kv-block { margin-bottom: 10px; }
.kv-label { color: var(--gold); font-weight: 600; text-transform: capitalize; }
.kv-value { color: var(--text-secondary); }

.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 72vh; text-align: center; padding: 40px;
}

.welcome-mark {
  font-family: 'Syne', sans-serif;
  font-size: 56px; font-weight: 800;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, var(--gold-bright), var(--gold), rgba(212,168,67,0.3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 16px;
  opacity: 0.5;
}

.welcome-text { font-size: 15px; color: var(--text-tertiary); line-height: 1.7; max-width: 380px; }

.spinner { display: flex; align-items: center; justify-content: center; min-height: 60vh; }

.spin {
  width: 28px; height: 28px;
  border: 2px solid var(--border-subtle);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: rotating 0.75s linear infinite;
}

@keyframes rotating { to { transform: rotate(360deg); } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp 0.35s ease forwards; }

.menu-toggle {
  display: none;
  position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--bg-2); border: 1px solid var(--border-light);
  border-radius: var(--radius-sm); padding: 8px;
  cursor: pointer; color: var(--gold); outline: none;
  transition: all var(--transition);
}

.menu-toggle:hover { background: var(--bg-3); }

.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  z-index: 90;
}

@media (max-width: 1024px) {
  .grid-4, .tf-grid { grid-template-columns: repeat(2,1fr); }
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 24px 0 60px rgba(0,0,0,0.5); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; }
  .menu-toggle { display: flex; align-items: center; justify-content: center; }
  .topbar { padding: 0 16px 0 50px; }
  .report-content { padding: 16px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .hero-price { font-size: 32px; }
  .hero-toprow { flex-direction: column; }
  .hero-price-block { text-align: left; }
}

@media (max-width: 480px) {
  .tf-grid { grid-template-columns: repeat(2,1fr); }
  .hero-instrument { font-size: 24px; }
}
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-eyebrow">Strategy Desk</div>
    <div class="logo-name">KenvinZone</div>
    <div class="logo-badge">LIVE</div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Instrument</div>
    <div class="filter-row" id="filter-instrument">
      <button class="filter-chip active" data-filter="instrument" data-value="all">Tất cả</button>
      <button class="filter-chip" data-filter="instrument" data-value="XAUUSD">XAUUSD</button>
      <button class="filter-chip" data-filter="instrument" data-value="NQ / US100">NQ / US100</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Bias</div>
    <div class="filter-row" id="filter-bias">
      <button class="filter-chip active" data-filter="bias_type" data-value="all">Tất cả</button>
      <button class="filter-chip" data-filter="bias_type" data-value="bearish">Bearish</button>
      <button class="filter-chip" data-filter="bias_type" data-value="bullish">Bullish</button>
      <button class="filter-chip" data-filter="bias_type" data-value="neutral">Neutral</button>
    </div>
  </div>

  <div class="report-list" id="reportList">
    <div class="spinner"><div class="spin"></div></div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-id" id="topbarId">—</span>
      <span class="topbar-sep">/</span>
      <span class="topbar-title" id="topbarTitle">Chọn báo cáo để xem</span>
    </div>
    <a class="btn-dl" id="btnDownload" href="#" style="display:none" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Tải DOCX
    </a>
  </div>

  <div id="reportContent">
    <div class="welcome">
      <div class="welcome-mark">KZ</div>
      <div class="welcome-text">Chọn một báo cáo từ danh sách bên trái để xem phân tích chiến lược chi tiết.</div>
    </div>
  </div>
</main>

<script>
const REPORTS_URL = 'reports.json';
let allReports = [];
let activeFilters = { instrument: 'all', bias_type: 'all' };
let activeId = null;

function normalize(r) {
  if (!r.raw) return r;

  let raw = r.raw;
  if (typeof raw === 'string') {
    try { raw = JSON.parse(raw); } catch(e) { return r; }
  }

  const summary = raw.summary || raw.executive_summary || raw.executiveSummary || {};
  const structure = raw.market_structure || raw.multi_timeframe_analysis || raw.multiTimeframeAnalysis || {};
  const scenariosObj = raw.trading_scenarios || raw.scenario_matrix || raw.scenarios || {};
  const catalystRaw = raw.catalyst_watch || raw.catalyst_context || raw.market_context || raw.catalyst || [];
  const confidence = raw.confidence_factors || {};
  const execution = raw.execution_plan || raw.trading_strategy || {};
  const keyLevelsRaw = raw.key_levels || raw.keyLevels || {};

  const bias =
    summary.primary_bias ||
    summary.bias_direction ||
    summary.bias ||
    raw.bias_primary ||
    raw.bias ||
    "Neutral";

  const bias_type =
    String(bias).toLowerCase().includes("bull") ? "bullish" :
    String(bias).toLowerCase().includes("bear") ? "bearish" :
    "neutral";

  const summaryText =
    summary.key_insight ||
    summary.summary ||
    summary.headline ||
    raw.dashboard_summary ||
    raw.telegram_summary ||
    "—";

  const catalyst =
    Array.isArray(catalystRaw)
      ? catalystRaw.join(" • ")
      : typeof catalystRaw === "object" && catalystRaw !== null
        ? Object.values(catalystRaw).flat().join(" • ")
        : (catalystRaw || "—");

  const timeframes = {
    D1: structure.D1?.bias || structure.D1?.trend || "—",
    H4: structure.H4?.bias || structure.H4?.trend || "—",
    H1: structure.H1?.bias || structure.H1?.trend || "—",
    M15: structure.M15?.bias || structure.M15?.trend || "—"
  };

  const scenarios = Object.entries(scenariosObj).map(([key, val], i) => ({
    id: i + 1,
    name: val?.bias || val?.scenario || key,
    zone: val?.setup || val?.condition || val?.action || "—",
    prob: val?.probability ? `${val.probability}%` : "—"
  }));

  const key_levels = {
    resistance:
      structure.H4?.critical_levels?.resistance ||
      keyLevelsRaw.resistance ||
      [],
    support:
      structure.H4?.critical_levels?.support ||
      keyLevelsRaw.support ||
      [],
    current:
      summary.current_price ||
      keyLevelsRaw.currentPrice ||
      r.price_current ||
      0
  };

  const instrumentDisplay = r.instrument || raw.metadata?.instrument || summary.instrument || "N/A";

  const sessionQuote =
    summary.key_insight ||
    execution.immediate_action ||
    raw.next_review ||
    "—";

  return {
    ...r,
    raw,
    instrument: instrumentDisplay,
    bias,
    bias_type,
    summary: summaryText,
    catalyst,
    session_quote: sessionQuote,
    key_levels,
    timeframes,
    scenarios,
    execution,
    confidence
  };
}

async function loadReports() {
  try {
    const res = await fetch(REPORTS_URL + '?t=' + Date.now());
    const data = await res.json();
    allReports = data.reports
      .map(normalize)
      .sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
    renderList();
    if (!activeId && allReports.length) showReport(allReports[0].id);
  } catch(e) {
    document.getElementById('reportList').innerHTML =
      '<div style="padding:20px 16px;color:var(--text-tertiary);font-size:12px">Không tải được dữ liệu.</div>';
  }
}

function renderList() {
  const filtered = allReports.filter(r => {
    if (activeFilters.instrument !== 'all' && r.instrument !== activeFilters.instrument) return false;
    if (activeFilters.bias_type !== 'all' && r.bias_type !== activeFilters.bias_type) return false;
    return true;
  });
  const el = document.getElementById('reportList');
  if (!filtered.length) {
    el.innerHTML = '<div style="padding:20px 16px;color:var(--text-tertiary);font-size:12px">Không có báo cáo phù hợp.</div>';
    return;
  }
  el.innerHTML = filtered.map(r => `
    <div class="report-item ${r.id === activeId ? 'active' : ''}" onclick="showReport('${r.id}')">
      <div class="ri-row1">
        <span class="ri-ticker">${r.instrument}</span>
        <span class="ri-time">${r.time_display}</span>
      </div>
      <div class="ri-row2">
        <span class="ri-bias-pill ${r.bias_type}">${r.bias}</span>
        <span class="ri-catalyst">${r.catalyst || '—'}</span>
      </div>
    </div>
  `).join('');
}

function fmt(n) {
  return typeof n === 'number' ? n.toLocaleString('vi-VN') : (n || '—');
}

function renderKV(obj) {
  if (!obj || typeof obj !== 'object') return '<div class="summary-text">—</div>';
  return Object.entries(obj).map(([k, v]) => `
    <div class="kv-block">
      <div class="kv-label">${String(k).replaceAll('_', ' ')}</div>
      <div class="kv-value summary-text">${Array.isArray(v) ? v.join(' • ') : (typeof v === 'object' ? JSON.stringify(v) : v)}</div>
    </div>
  `).join('');
}

function showReport(id) {
  const r = allReports.find(x => x.id === id);
  if (!r) return;
  activeId = id;
  renderList();

  document.getElementById('topbarId').textContent = r.id;
  document.getElementById('topbarTitle').textContent = `${r.instrument} · ${r.date_display} ${r.time_display}`;

  const dlBtn = document.getElementById('btnDownload');
  if (r.docx_url) {
    dlBtn.href = r.docx_url;
    dlBtn.style.display = 'inline-flex';
  } else {
    dlBtn.style.display = 'none';
  }

  const lv = r.key_levels || { resistance: [], support: [], current: 0 };

  const resistHtml = (lv.resistance || []).map(p => `
    <div class="level-row">
      <div class="level-type-wrap">
        <div class="level-dot resist"></div>
        <span class="level-type resist">Kháng cự</span>
      </div>
      <span class="level-price">${fmt(p)}</span>
    </div>
  `).join('');

  const supportHtml = (lv.support || []).map(p => `
    <div class="level-row">
      <div class="level-type-wrap">
        <div class="level-dot support"></div>
        <span class="level-type support">Hỗ trợ</span>
      </div>
      <span class="level-price">${fmt(p)}</span>
    </div>
  `).join('');

  const currentHtml = `
    <div class="level-row is-current" style="background:var(--gold-subtle);border-radius:8px;border:1px solid var(--gold-border)">
      <div class="level-type-wrap">
        <div class="level-dot current"></div>
        <span class="level-type current">Hiện tại</span>
      </div>
      <span class="level-price" style="font-size:18px">${fmt(lv.current)}</span>
    </div>
  `;

  const tfHtml = Object.entries(r.timeframes || {}).map(([tf, bias]) => `
    <div class="tf-item">
      <div class="tf-label">${tf}</div>
      <div class="tf-bias">${bias}</div>
    </div>
  `).join('');

  const scenHtml = (r.scenarios || []).map(s => `
    <div class="scen-row">
      <span class="scen-id">${s.id}</span>
      <span class="scen-name">${s.name}</span>
      <span class="scen-zone">${s.zone}</span>
      <div class="scen-prob-wrap">
        <span class="scen-prob-val">${s.prob}</span>
        <div class="prob-track">
          <div class="prob-fill" style="width:${parseInt(s.prob) || 0}%"></div>
        </div>
      </div>
    </div>
  `).join('');

  const executionHtml = r.execution && Object.keys(r.execution).length
    ? `
      <div class="card">
        <div class="card-title"><div class="card-title-dot"></div>Kế hoạch thực thi</div>
        ${renderKV(r.execution)}
      </div>
    `
    : '';

  const confidenceHtml = r.confidence && Object.keys(r.confidence).length
    ? `
      <div class="card">
        <div class="card-title"><div class="card-title-dot"></div>Confidence factors</div>
        ${renderKV(r.confidence)}
      </div>
    `
    : '';

  document.getElementById('reportContent').innerHTML = `
    <div class="report-content fade-up">

      <div class="hero-card">
        <div class="hero-inner">
          <div class="hero-toprow">
            <div class="hero-left">
              <div class="hero-instrument-row">
                <span class="hero-instrument">${r.instrument}</span>
                <span class="hero-archetype">${r.archetype || 'Báo cáo tự động'}</span>
              </div>
              <div class="hero-datetime">${r.date_display} · ${r.time_display} UTC+7</div>
            </div>
            <div class="hero-price-block">
              <div class="hero-price-label">Giá tham chiếu</div>
              <div class="hero-price">${fmt(r.price_current)}</div>
            </div>
          </div>

          <div class="hero-bias-row">
            <span class="hero-bias-label">Bias</span>
            <span class="hero-bias-badge ${r.bias_type}">${r.bias}</span>
          </div>

          <div class="hero-divider"></div>

          <div class="hero-quote-block">
            <div class="hero-quote-bar"></div>
            <div class="hero-quote-text">${r.session_quote || '—'}</div>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card card-prominent">
          <div class="card-title"><div class="card-title-dot"></div>Tóm tắt phân tích</div>
          <div class="summary-text">${typeof r.summary === 'string' ? r.summary : JSON.stringify(r.summary)}</div>
        </div>
        <div class="card">
          <div class="card-title"><div class="card-title-dot"></div>Catalyst & Lịch tin</div>
          <div class="catalyst-block">${r.catalyst || '—'}</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="card-title"><div class="card-title-dot"></div>Đa khung thời gian</div>
        <div class="tf-grid">${tfHtml || '<span style="color:var(--text-tertiary);font-size:12px">Không có dữ liệu</span>'}</div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title"><div class="card-title-dot"></div>Mức giá then chốt</div>
          <div class="levels-wrap">
            ${resistHtml}
            <div class="level-divider"></div>
            ${currentHtml}
            <div class="level-divider"></div>
            ${supportHtml}
          </div>
        </div>
        <div class="card">
          <div class="card-title"><div class="card-title-dot"></div>Scenario matrix</div>
          <div class="scenario-table">${scenHtml || '<span style="color:var(--text-tertiary);font-size:12px">Không có dữ liệu</span>'}</div>
        </div>
      </div>

      <div class="grid-2">
        ${executionHtml || '<div></div>'}
        ${confidenceHtml || '<div></div>'}
      </div>

    </div>
  `;

  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.filter;
    activeFilters[type] = btn.dataset.value;
    document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
    const filtered = allReports.filter(r => {
      if (activeFilters.instrument !== 'all' && r.instrument !== activeFilters.instrument) return false;
      if (activeFilters.bias_type !== 'all' && r.bias_type !== activeFilters.bias_type) return false;
      return true;
    });
    if (filtered.length) showReport(filtered[0].id);
  });
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

loadReports();
setInterval(loadReports, 5 * 60 * 1000);
</script>
</body>
</html>
